name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $parts = $tag.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $ver = $parts -join '.'
          $file = "Folderss/Properties/AssemblyInfo.cs"
          (Get-Content $file) `
            -replace 'AssemblyVersion\("[^"]*"\)', "AssemblyVersion(`"$ver`")" `
            -replace 'AssemblyFileVersion\("[^"]*"\)', "AssemblyFileVersion(`"$ver`")" |
            Set-Content $file

      - name: Restore
        run: dotnet restore .\Folderss.sln

      - name: Publish Release
        shell: pwsh
        run: |
          $packageDir = "artifacts/Folderss-${{ github.ref_name }}"
          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          dotnet publish .\Folderss\Folderss.csproj -c Release -o $packageDir --nologo

      - name: Create ZIP
        shell: pwsh
        run: |
          $packageDir = "artifacts/Folderss-${{ github.ref_name }}"
          $zipPath = "Folderss-${{ github.ref_name }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$packageDir\*" -DestinationPath $zipPath

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Folderss-${{ github.ref_name }}.zip
          generate_release_notes: true
