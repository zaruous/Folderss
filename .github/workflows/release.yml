name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Folderss.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild Folderss/Folderss.csproj /p:Configuration=Release /p:Platform=AnyCPU /v:minimal

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path Folderss/bin/Release/* -DestinationPath "Folderss-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Folderss-${{ github.ref_name }}.zip
          generate_release_notes: true
